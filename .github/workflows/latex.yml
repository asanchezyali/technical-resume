name: Build CV and Generate README

on:
  push:
    branches: [main]
    paths:
      - 'data/resume-master.json'
      - 'src/**'
      - 'templates/**'
      - '.github/workflows/latex.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Generate README.md
        run: uv run python agent.py readme

      - name: Generate complete CV LaTeX
        run: uv run python agent.py complete -o technical-resume

      - name: Install LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: generated/technical-resume.tex
          working_directory: .

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: List generated files
        run: ls -la generated/

      - name: Commit README.md to main
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Check if README.md changed
          if git diff --quiet README.md; then
            echo "No changes to README.md"
          else
            git add README.md
            git commit -m "📄 Update README.md - ${{ steps.date.outputs.date }}" || echo "No changes to commit"
            git push origin main
          fi

      - name: Upload PDF to technical-resume branch
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Save the PDF
          cp generated/technical-resume.pdf /tmp/technical_resume.pdf

          # Switch to technical-resume branch
          if git show-ref --verify --quiet refs/remotes/origin/technical-resume; then
            git checkout technical-resume
          else
            git checkout --orphan technical-resume
            git rm -rf .
          fi

          # Copy PDF back
          cp /tmp/technical_resume.pdf ./technical_resume.pdf

          # Commit and push
          git add technical_resume.pdf
          git commit -m "🚀 Update PDF resume - ${{ steps.date.outputs.date }}" || echo "No changes to commit"
          git push origin technical-resume

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Technical Resume
          path: generated/technical-resume.pdf
